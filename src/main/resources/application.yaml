server:
  servlet:
    context-path: /soulfood
spring:
  application:
    name: soulfood-backend
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: food
    default-schema: food
    create-schemas: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  datasource:
    url: jdbc:postgresql://pgm-2vc574u66oe06366.pgsql.cn-chengdu.rds.aliyuncs.com:5432/food?stringtype=unspecified&currentSchema=food
    username: commerce
    password: nxVRjxu6iVKIoTmC
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 2
      maximum-pool-size: 50
      auto-commit: true
      idle-timeout: 30000
      pool-name: foodServiceHikariPool
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  jackson:
    default-property-inclusion: non_null
  ai:
    openai:
      api-key: 6044cf7f25964e519efa410456ff7ac0.qbu0U2g6X9CFtXXH
      base-url: https://open.bigmodel.cn/api/paas/v4
      chat:
        completions-path: /chat/completions
        options:
          model: glm-4-flash
          temperature: 0.7
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

app:
  jwt:
    secret: ${JWT_SECRET:decidemeal-dev-secret-change-in-production-32b}
    access-token-expire-hours: ${JWT_EXPIRE_HOURS:168}
  amap:
    api-key: ${AMAP_API_KEY:}
    base-url: https://restapi.amap.com
    default-lng: 104.065735
    default-lat: 30.657462
    search-radius: 3000
    page-size: 20
